services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: archiv-api-dev
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/workspace/backend
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload --reload-dir .
